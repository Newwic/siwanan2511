<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siwanan2511 Aluminum</title>
<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f4f6f9;
    color: #333;
}

/* Navbar */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
    height: 80px; /* สูงขึ้นให้โลโก้ใหญ่ขึ้น */
    background-color: #ffffff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    position: sticky;
    top: 0;
    z-index: 1000;
}

nav .logo img {
    height: 90px; /* โลโก้ใหญ่ขึ้น */
    max-width: 200px;
}

/* Menu */
.menu-toggle {
    display: none;
    font-size: 28px;
    cursor: pointer;
    color: #333;
}

.nav-links {
    display: flex;
    align-items: center;
}

.nav-links a {
    color: #333;
    margin-left: 25px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.nav-links a:hover {
    color: #fca311;
}

/* Hero */
header {
    height: 60vh;
    background-color: #0d1b2a;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 0 20px;
}

header h1 {
    font-size: 3rem; /* ตัวใหญ่ขึ้น */
    margin-bottom: 15px;
}

header p {
    font-size: 1.3rem;
    margin-bottom: 25px;
}

/* Buttons */
.btn {
    background: #fca311;
    padding: 14px 24px;
    margin: 5px;
    text-decoration: none;
    border-radius: 6px;
    font-weight: bold;
    color: #000;
    transition: 0.3s;
}

.btn:hover {
    opacity: 0.9;
}

.green {
    background: #25d366;
    color: white;
}

/* Sections */
section {
    padding: 60px 20px;
    text-align: center;
}

/* Grid */
.grid {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 25px;
}

.card {
    background: white;
    margin: 10px;
    padding: 35px 25px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    min-width: 220px;
    max-width: 320px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-7px);
    box-shadow: 0 14px 30px rgba(0,0,0,0.15);
}

/* Contact */
#contact {
    background: #14213d;
    color: white;
}

/* Floating LINE */
.float {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25d366;
    padding: 15px;
    border-radius: 50%;
    text-decoration: none;
    font-size: 24px;
}

/* Footer */
footer {
    background: #000;
    color: white;
    padding: 15px;
    text-align: center;
}

/* Mobile */
@media (max-width: 600px) {
    .menu-toggle {
        display: block;
    }

    .nav-links {
        position: absolute;
        top: 80px;
        right: 0;
        background: white;
        width: 100%;
        display: none;
        flex-direction: column;
        padding: 15px 0;
        box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    .nav-links.show {
        display: flex;
    }

    header h1 {
        font-size: 2.2rem;
    }

    header p {
        font-size: 1rem;
    }

    .grid {
        flex-direction: column;
        align-items: center;
    }
}

/* Fade animation */
.fade {
    opacity: 0;
    transform: translateY(30px);
    transition: 0.6s;
}

.fade.show {
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>
<body>

<!-- Navbar -->
<nav>
    <a href="#home" class="logo">
        <img src="images/ggez2.jpg" alt="Siwanan2511 Logo">
    </a>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    <div class="nav-links" id="navLinks">
        <a href="#home">หน้าแรก</a>
        <a href="#services">บริการ</a>
        <a href="#work">ผลงาน</a>
        <a href="#contact">ติดต่อ</a>
    </div>
</nav>

<!-- Hero -->
<header id="home">
    <h1>รับติดตั้งอลูมิเนียม กระจก</h1>
    <p>บริการครบวงจร บางบัวทอง นนทบุรี</p>
    <div>
        <a href="tel:0825429782" class="btn">📞 โทรเลย</a>
        <a href="https://line.me/ti/p/~siwanan2511" class="btn green">💬 LINE</a>
    </div>
</header>

<!-- Services -->
<section id="services" class="fade">
    <h2>บริการของเรา</h2>
    <div class="grid">
        <div class="card">งานอลูมิเนียม</div>
        <div class="card">งานกระจก</div>
        <div class="card">งานก่อสร้าง</div>
    </div>
</section>

<!-- Work -->
<section id="work" class="fade">
    <h2>ผลงานบางส่วน</h2>
    <div class="grid">
        <div class="card">ผลงาน 1</div>
        <div class="card">ผลงาน 2</div>
        <div class="card">ผลงาน 3</div>
    </div>
</section>

<!-- Contact -->
<section id="contact" class="fade">
    <h2>ติดต่อเรา</h2>
    <p>📞 082-542-9782</p>
    <p>📍 บางบัวทอง นนทบุรี</p>
</section>
    <iframe 
        src="https://www.google.com/maps?q=13.9518981,100.439884&z=18&output=embed"
        width="100%" height="300">
    </iframe>

<!-- Floating LINE -->
<a href="https://line.me/ti/p/~siwanan2511" class="float">💬</a>

<!-- Footer -->
<footer>
    <p>© 2026 Siwanan2511 Aluminum</p>
</footer>

<script>
function toggleMenu() {
    document.getElementById("navLinks").classList.toggle("show");
}

// Fade animation
const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if(entry.isIntersecting){
            entry.target.classList.add("show");
        }
    });
});
document.querySelectorAll(".fade").forEach(el => observer.observe(el));
</script>
</body>
</html>
